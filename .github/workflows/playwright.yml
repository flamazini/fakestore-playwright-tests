name: API Tests (Playwright)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      target:
        description: "Which BASE_URL to run against"
        required: true
        default: "mock"
        type: choice
        options: [mock, live]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck

      - name: Run tests against local mock server
        run: npm run test:local

      - name: Run tests against the live FakeStoreAPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'live'
        run: npm run test:live

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30